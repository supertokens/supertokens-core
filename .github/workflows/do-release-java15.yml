name: Release (Java 15)

on:
  workflow_dispatch:
    inputs:
      core-version:
        description: 'Core version (e.g. 10.1.7)'
        required: true
        type: string
      plugin-interface-version:
        description: 'Plugin interface version (e.g. 7.1.1)'
        required: true
        type: string
      postgresql-plugin-version:
        description: 'PostgreSQL plugin version (e.g. 8.1.5)'
        required: true
        type: string
      release-plugin-interface:
        description: 'Release a new plugin-interface version'
        required: true
        type: boolean
        default: true
      release-postgresql-plugin:
        description: 'Release a new postgresql-plugin version'
        required: true
        type: boolean
        default: true
      is-latest-release:
        description: 'Is this the latest release? (tags the Docker image as "latest")'
        required: true
        type: boolean
        default: false
      is-latest-for-major:
        description: 'Is this the latest release for its major version? (tags the Docker image with the major version, e.g. "9")'
        required: true
        type: boolean
        default: true
      run-stress-tests:
        description: 'Run stress tests'
        required: true
        type: boolean
        default: true

jobs:
  # ── Resolve branches for the given versions ───────────────────────
  dependency-branches:
    name: Resolve dependencies
    environment: publish
    runs-on: ubuntu-22.04
    outputs:
      branches: ${{ steps.result.outputs.branches }}
      core-sha: ${{ steps.shas.outputs.core }}
      plugin-interface-sha: ${{ steps.shas.outputs.plugin-interface }}
      postgresql-sha: ${{ steps.shas.outputs.postgresql }}
    steps:
      - uses: actions/checkout@v4
      - uses: supertokens/get-core-dependencies-action@main
        id: result
        with:
          run-for: add-dev-tag
          core-version: ${{ inputs.core-version }}
          plugin-interface-version: ${{ inputs.plugin-interface-version }}
          postgresql-plugin-version: ${{ inputs.postgresql-plugin-version }}
      - name: Resolve commit SHAs
        id: shas
        env:
          BRANCHES: ${{ steps.result.outputs.branches }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          core_branch=$(echo "$BRANCHES" | jq -r '.core')
          pi_branch=$(echo "$BRANCHES" | jq -r '.["plugin-interface"]')
          pg_branch=$(echo "$BRANCHES" | jq -r '.postgresql')

          core_sha=$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/supertokens/supertokens-core.git" "refs/heads/$core_branch" | cut -f1)
          pi_sha=$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/supertokens/supertokens-plugin-interface.git" "refs/heads/$pi_branch" | cut -f1)
          pg_sha=$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/supertokens/supertokens-postgresql-plugin.git" "refs/heads/$pg_branch" | cut -f1)

          echo "core=$core_sha" >> $GITHUB_OUTPUT
          echo "plugin-interface=$pi_sha" >> $GITHUB_OUTPUT
          echo "postgresql=$pg_sha" >> $GITHUB_OUTPUT

  # ── Register new versions with the SuperTokens API ────────────────
  register-core-version:
    name: Register core version
    environment: publish
    runs-on: ubuntu-22.04
    needs: dependency-branches
    steps:
      - name: Checkout supertokens-core
        uses: actions/checkout@v4
        # No ref: — defaults to github.sha (workflow branch), gets latest helper scripts
      - name: Fetch release data files from release branch
        run: |
          git fetch origin ${{ needs.dependency-branches.outputs.core-sha }}
          git checkout ${{ needs.dependency-branches.outputs.core-sha }} -- \
            build.gradle \
            pluginInterfaceSupported.json \
            coreDriverInterfaceSupported.json
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Register core version
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
        run: python .github/helpers/register-new-core-version.py

  register-plugin-version:
    name: Register PostgreSQL plugin version
    if: inputs.release-postgresql-plugin
    environment: publish
    runs-on: ubuntu-22.04
    needs: dependency-branches
    steps:
      - name: Checkout supertokens-core
        uses: actions/checkout@v4
        # No ref: — defaults to github.sha (workflow branch), gets latest helper scripts
        # (No data files from core are needed here; postgresql plugin provides them)
      - name: Checkout supertokens-postgresql-plugin
        uses: actions/checkout@v4
        with:
          path: supertokens-plugin
          repository: supertokens/supertokens-postgresql-plugin
          ref: ${{ needs.dependency-branches.outputs.postgresql-sha }}
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Register plugin version
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
          PLUGIN_NAME: postgresql
        run: |
          cd supertokens-plugin
          python ../.github/helpers/register-new-plugin-version.py

  # ── Run unit tests (sqlite + postgresql) ──────────────────────────
  test:
    name: Tests (${{ matrix.plugin }})
    needs: [ dependency-branches, register-core-version ]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - sqlite
          - postgresql

    steps:
      - name: Set up JDK 15
        uses: actions/setup-java@v4
        with:
          java-version: 15
          distribution: zulu

      - name: Checkout supertokens-root
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-root
          path: supertokens-root
          ref: for_jdk_15_releases

      - name: Checkout supertokens-core
        uses: actions/checkout@v4
        with:
          path: supertokens-root/supertokens-core
          ref: ${{ needs.dependency-branches.outputs.core-sha }}

      - name: Checkout supertokens-plugin-interface
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-plugin-interface
          path: supertokens-root/supertokens-plugin-interface
          ref: ${{ needs.dependency-branches.outputs.plugin-interface-sha }}

      - name: Checkout supertokens-postgresql-plugin
        if: matrix.plugin == 'postgresql'
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-postgresql-plugin
          path: supertokens-root/supertokens-postgresql-plugin
          ref: ${{ needs.dependency-branches.outputs.postgresql-sha }}

      - name: Load modules
        run: |
          cd supertokens-root
          cat > modules.txt <<'EOF'
          core,master
          plugin-interface,master
          ${{ matrix.plugin }}-plugin,master
          EOF
          ./loadModules

      - name: Start PostgreSQL
        if: matrix.plugin == 'postgresql'
        run: supertokens-root/supertokens-postgresql-plugin/startDb.sh

      - name: Start Hydra
        run: |
          docker run -d \
            --name hydra \
            --network host \
            -e DSN=memory \
            -e URLS_SELF_ISSUER=http://localhost:4444 \
            -e URLS_LOGIN=http://localhost:3001/auth/oauth/login \
            -e URLS_CONSENT=http://localhost:3001/auth/oauth/consent \
            -e URLS_LOGOUT=http://localhost:3001/auth/oauth/logout \
            -e SECRETS_SYSTEM=thisIsATestSecretThatIsAtLeast32Chars \
            -e SECRETS_COOKIE=thisIsATestCookieSecretAtLeast32 \
            -e SERVE_COOKIES_SAME_SITE_MODE=Lax \
            oryd/hydra:v2.2.0 serve all --dev
          for i in $(seq 1 30); do
            if wget -q --spider http://localhost:4444/health/alive 2>/dev/null; then
              echo "Hydra is ready"
              break
            fi
            echo "Waiting for Hydra... ($i/30)"
            sleep 2
          done

      - name: Setup test environment
        run: cd supertokens-root && ./utils/setupTestEnv --local

      - name: Check implementationDependencies.json is up to date
        run: |
          cd supertokens-root
          ./gradlew generateDependenciesJson
          git -C supertokens-core diff --exit-code \
            implementationDependencies.json \
            ee/implementationDependencies.json \
            cli/implementationDependencies.json
          if [ "${{ matrix.plugin }}" = "postgresql" ]; then
            git -C supertokens-postgresql-plugin diff --exit-code implementationDependencies.json
          fi

      - name: Run tests
        env:
          ST_PLUGIN_NAME: ${{ matrix.plugin }}
        run: |
          cd supertokens-root
          ./gradlew test

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          detailed_summary: true
          include_passed: false
          annotate_notice: true

  # ── Mark test results on the SuperTokens API ──────────────────────
  mark-as-passed:
    name: Mark as passed (${{ matrix.plugin }})
    environment: publish
    needs: [ dependency-branches, register-plugin-version, test ]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - sqlite
          - postgresql
    steps:
      - name: Mark plugin as passed
        if: matrix.plugin != 'sqlite' && inputs.release-postgresql-plugin
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Content-Type: application/json" \
            -H "api-version: 0" \
            -d "{\"password\":\"$SUPERTOKENS_API_KEY\",\"version\":\"${{ inputs.postgresql-plugin-version }}\",\"planType\":\"FREE\",\"name\":\"${{ matrix.plugin }}\",\"testPassed\":true}" \
            https://api.supertokens.io/0/plugin)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "API request failed with status $status"
            exit 1
          fi
      - name: Mark core as passed
        if: matrix.plugin == 'sqlite'
        env:
          SUPERTOKENS_API_KEY: ${{ secrets.SUPERTOKENS_API_KEY }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Content-Type: application/json" \
            -H "api-version: 0" \
            -d "{\"password\":\"$SUPERTOKENS_API_KEY\",\"version\":\"${{ inputs.core-version }}\",\"planType\":\"FREE\",\"testPassed\":true}" \
            https://api.supertokens.io/0/core)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$status" != "200" ]; then
            echo "API request failed with status $status"
            exit 1
          fi

  # ── Build and publish the dev Docker image ────────────────────────
  build-docker:
    name: Build Docker image
    needs: [ dependency-branches ]
    runs-on: ubuntu-22.04
    outputs:
      dev-tag: ${{ steps.set_tag.outputs.TAG }}
    steps:
      - name: Set up JDK 15
        uses: actions/setup-java@v4
        with:
          java-version: 15
          distribution: zulu

      - name: Checkout supertokens-root
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-root
          path: supertokens-root
          ref: for_jdk_15_releases

      - name: Checkout supertokens-core
        uses: actions/checkout@v4
        with:
          path: supertokens-root/supertokens-core
          ref: ${{ needs.dependency-branches.outputs.core-sha }}

      - name: Checkout supertokens-plugin-interface
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-plugin-interface
          path: supertokens-root/supertokens-plugin-interface
          ref: ${{ needs.dependency-branches.outputs.plugin-interface-sha }}

      - name: Checkout supertokens-postgresql-plugin
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-postgresql-plugin
          path: supertokens-root/supertokens-postgresql-plugin
          ref: ${{ needs.dependency-branches.outputs.postgresql-sha }}

      - name: Load modules
        run: |
          cd supertokens-root
          cat > modules.txt <<'EOF'
          core,master
          plugin-interface,master
          postgresql-plugin,master
          EOF
          ./loadModules

      - name: Setup test environment
        run: cd supertokens-root && ./utils/setupTestEnv --local

      - name: Generate config file
        run: |
          cd supertokens-root
          cat supertokens-core/config.yaml > config.yaml
          cat supertokens-postgresql-plugin/config.yaml >> config.yaml

      - name: Compute image tag
        id: set_tag
        run: |
          echo "TAG=${{ inputs.core-version }}-dev" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./supertokens-root
          tags: supertokens/supertokens-dev-postgresql:${{ steps.set_tag.outputs.TAG }}
          file: ./supertokens-root/supertokens-postgresql-plugin/.github/helpers/docker/Dockerfile
          platforms: linux/amd64,linux/arm64

  # ── Stress tests ──────────────────────────────────────────────────
  stress-tests:
    name: Stress tests
    if: inputs.run-stress-tests
    needs: [ build-docker ]
    uses: ./.github/workflows/stress-tests.yml
    with:
      tag: ${{ needs.build-docker.outputs.dev-tag }}

  # ── Tag and publish the release Docker image ──────────────────────
  release-docker:
    name: Release Docker image
    environment: publish
    needs: [ build-docker, stress-tests, mark-as-passed ]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Tag and push release images
        run: |
          tag="${{ inputs.core-version }}"
          major=$(echo "$tag" | cut -d. -f1)
          minor=$(echo "$tag" | cut -d. -f1,2)
          dev_tag="${{ needs.build-docker.outputs.dev-tag }}"

          bash .github/helpers/release-docker.sh \
            "supertokens/supertokens-dev-postgresql:$dev_tag" \
            "supertokens/supertokens-postgresql:$tag"

          bash .github/helpers/release-docker.sh \
            "supertokens/supertokens-dev-postgresql:$dev_tag" \
            "supertokens/supertokens-postgresql:$minor"

          if [ "${{ inputs.is-latest-for-major }}" == "true" ]; then
            bash .github/helpers/release-docker.sh \
              "supertokens/supertokens-dev-postgresql:$dev_tag" \
              "supertokens/supertokens-postgresql:$major"
          fi

          if [ "${{ inputs.is-latest-release }}" == "true" ]; then
            bash .github/helpers/release-docker.sh \
              "supertokens/supertokens-dev-postgresql:$dev_tag" \
              "supertokens/supertokens-postgresql:latest"
          fi

  # ── Tag all repos with release versions ───────────────────────────
  add-release-tags:
    name: Add release tags
    environment: publish
    needs: [dependency-branches, release-docker]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Set up JDK 15
        uses: actions/setup-java@v4
        with:
          java-version: 15
          distribution: zulu

      - name: Checkout supertokens-root
        uses: actions/checkout@v4
        with:
          repository: supertokens/supertokens-root
          path: supertokens-root
          ref: for_jdk_15_releases

      - name: Checkout supertokens-core
        run: |
          cd supertokens-root
          git clone https://${{ secrets.GH_TOKEN }}@github.com/supertokens/supertokens-core.git
          git -C supertokens-core checkout ${{ needs.dependency-branches.outputs.core-sha }}

      - name: Checkout supertokens-plugin-interface
        run: |
          cd supertokens-root
          git clone https://${{ secrets.GH_TOKEN }}@github.com/supertokens/supertokens-plugin-interface.git
          git -C supertokens-plugin-interface checkout ${{ needs.dependency-branches.outputs.plugin-interface-sha }}

      - name: Checkout supertokens-postgresql-plugin
        run: |
          cd supertokens-root
          git clone https://${{ secrets.GH_TOKEN }}@github.com/supertokens/supertokens-postgresql-plugin.git
          git -C supertokens-postgresql-plugin checkout ${{ needs.dependency-branches.outputs.postgresql-sha }}

      - name: Write release password
        run: |
          cd supertokens-root
          echo "${{ secrets.SUPERTOKENS_API_KEY }}" > releasePassword
          echo "${{ secrets.SUPERTOKENS_API_KEY }}" > apiPassword

      - name: Load modules
        run: |
          cd supertokens-root
          cat > modules.txt <<'EOF'
          core,master
          plugin-interface,master
          postgresql-plugin,master
          EOF
          ./loadModules

      - name: Setup test environment
        run: cd supertokens-root && ./utils/setupTestEnv --local

      - name: Git config
        run: |
          git config --global user.name "Supertokens Bot"
          git config --global user.email "<>"

      - name: Tag plugin-interface
        id: tag-pi
        if: inputs.release-plugin-interface
        run: |
          cd supertokens-root/supertokens-plugin-interface
          ./addReleaseTag

      - name: Create plugin-interface GitHub release
        if: steps.tag-pi.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "v${{ inputs.plugin-interface-version }}" \
            --repo supertokens/supertokens-plugin-interface \
            --title "v${{ inputs.plugin-interface-version }}" \
            --generate-notes \
            ${{ inputs.is-latest-release && '--latest' || '--latest=false' }}

      - name: Tag postgresql-plugin
        id: tag-pg
        if: inputs.release-postgresql-plugin
        run: |
          cd supertokens-root/supertokens-postgresql-plugin
          ./addReleaseTag

      - name: Create postgresql-plugin GitHub release
        if: steps.tag-pg.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "v${{ inputs.postgresql-plugin-version }}" \
            --repo supertokens/supertokens-postgresql-plugin \
            --title "v${{ inputs.postgresql-plugin-version }}" \
            --generate-notes \
            ${{ inputs.is-latest-release && '--latest' || '--latest=false' }}

      - name: Tag core
        id: tag-core
        run: |
          cd supertokens-root/supertokens-core
          ./addReleaseTag

      - name: Create core GitHub release
        if: steps.tag-core.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release create "v${{ inputs.core-version }}" \
            --repo supertokens/supertokens-core \
            --title "v${{ inputs.core-version }}" \
            --generate-notes \
            ${{ inputs.is-latest-release && '--latest' || '--latest=false' }}
