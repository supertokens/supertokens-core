name: Retag Docker Image

on:
  workflow_dispatch:
    inputs:
      source-tag:
        description: 'Source image tag (e.g. supertokens/supertokens-dev-postgresql:fix_my-branch)'
        required: true
        type: string
      target-tag:
        description: 'Target image tag (e.g. supertokens/supertokens-postgresql:9.3.3)'
        required: true
        type: string

jobs:
  retag:
    name: Retag Docker image
    environment: publish
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag and push
        run: |
          bash .github/helpers/release-docker.sh \
            "${{ inputs.source-tag }}" \
            "${{ inputs.target-tag }}"
